<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 UNO Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #2d0b5e 40%, #1a1a4e 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }

  #topScreen { gap: 22px; }

  .logo {
    font-size: 5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #ff6ec7, #ffb347, #ff6ec7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,110,199,0.5));
    animation: logoPulse 2s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100% { filter: drop-shadow(0 0 20px rgba(255,110,199,0.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(255,110,199,0.9)); }
  }
  .subtitle { font-size: 1rem; color: #c9a0ff; letter-spacing: 3px; text-transform: uppercase; }
  .char-select-title { font-size: 1.1rem; color: #ffb6e6; font-weight: 700; }

  .char-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 380px;
  }
  .char-btn {
    background: rgba(255,255,255,0.08);
    border: 3px solid rgba(255,255,255,0.15);
    border-radius: 18px;
    padding: 14px 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }
  .char-btn:hover { transform: translateY(-3px) scale(1.04); background: rgba(255,255,255,0.14); }
  .char-btn.selected {
    border-color: #ff6ec7;
    background: rgba(255,110,199,0.2);
    box-shadow: 0 0 18px rgba(255,110,199,0.4);
    transform: scale(1.04);
  }
  .char-btn .char-emoji { font-size: 2.2rem; }
  .char-btn .char-name { font-size: 0.8rem; color: #e8c8ff; }

  .name-row { display: flex; gap: 10px; align-items: center; width: 100%; max-width: 380px; }
  .name-input {
    flex: 1; padding: 12px 18px; border-radius: 50px;
    border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1);
    color: #fff; font-size: 1rem; font-family: 'Nunito', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .name-input::placeholder { color: rgba(255,255,255,0.4); }
  .name-input:focus { border-color: #ff6ec7; }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  .btn {
    padding: 13px 26px; border-radius: 50px; border: none; font-size: 1rem; font-weight: 800;
    cursor: pointer; font-family: 'Nunito', sans-serif; transition: all 0.2s; letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
  .btn:active { transform: translateY(0); }
  .btn-create { background: linear-gradient(135deg, #ff6ec7, #c44dff); color: #fff; box-shadow: 0 6px 20px rgba(255,110,199,0.4); }
  .btn-join { background: linear-gradient(135deg, #4dbbff, #6e5bff); color: #fff; box-shadow: 0 6px 20px rgba(77,187,255,0.4); }
  .btn-start { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a0533; box-shadow: 0 6px 20px rgba(67,233,123,0.4); font-size: 1.1rem; padding: 15px 36px; }
  .btn-leave { background: rgba(255,255,255,0.1); color: #ffb6e6; border: 2px solid rgba(255,255,255,0.2); padding: 9px 20px; font-size: 0.88rem; }
  .btn-sound { position: fixed; top: 14px; right: 14px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 7px 14px; color: #fff; font-size: 1rem; cursor: pointer; z-index: 9999; font-family: 'Nunito', sans-serif; transition: background 0.2s; }
  .btn-sound:hover { background: rgba(255,255,255,0.25); }

  .card-box {
    background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.12); border-radius: 22px;
    padding: 32px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 18px;
    align-items: center; backdrop-filter: blur(12px);
  }
  .card-box h2 { font-size: 1.5rem; font-weight: 800; color: #ffb6e6; }
  .room-code { font-size: 3rem; font-weight: 900; letter-spacing: 8px; color: #ffe06e; text-shadow: 0 0 20px rgba(255,224,110,0.5); font-family: monospace; }
  .info-text { color: rgba(255,255,255,0.6); font-size: 0.88rem; text-align: center; }

  .join-input {
    padding: 14px 20px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1); color: #fff; font-size: 1.6rem; font-family: monospace;
    letter-spacing: 8px; text-align: center; width: 100%; outline: none;
  }
  .join-input:focus { border-color: #4dbbff; }

  .player-list { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 360px; }
  .player-item {
    background: rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 0.95rem;
  }
  .player-item .p-emoji { font-size: 1.6rem; }
  .player-item .host-badge { margin-left: auto; background: #ffe06e; color: #1a0533; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 800; }

  /* GAME */
  #gameScreen { display: none; flex-direction: column; min-height: 100vh; padding: 0; gap: 0; }
  #gameScreen.active { display: flex; justify-content: space-between; align-items: stretch; }

  .game-header {
    background: rgba(0,0,0,0.3); padding: 9px 14px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .game-title-small {
    font-size: 1.3rem; font-weight: 900;
    background: linear-gradient(135deg, #ff6ec7, #ffb347);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .turn-indicator { font-size: 0.82rem; font-weight: 700; color: #c9a0ff; text-align: right; }
  .turn-indicator.my-turn { color: #43e97b; }

  .opponents-row {
    display: flex; justify-content: center; gap: 8px;
    padding: 8px 14px; flex-wrap: wrap; background: rgba(0,0,0,0.15);
  }
  .opponent-card {
    background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 7px 12px; display: flex; align-items: center;
    gap: 7px; font-size: 0.82rem; font-weight: 700; transition: all 0.3s;
  }
  .opponent-card.active-player { border-color: #43e97b; background: rgba(67,233,123,0.15); box-shadow: 0 0 10px rgba(67,233,123,0.4); }
  /* UNO状態の相手 */
  .opponent-card.uno-danger {
    border-color: #ff6ec7;
    background: rgba(255,110,199,0.2);
    box-shadow: 0 0 16px rgba(255,110,199,0.6);
    animation: unoDanger 0.6s ease-in-out infinite alternate;
  }
  @keyframes unoDanger {
    from { box-shadow: 0 0 10px rgba(255,110,199,0.4); }
    to { box-shadow: 0 0 24px rgba(255,110,199,0.9); transform: scale(1.04); }
  }
  .opponent-card .op-emoji { font-size: 1.4rem; }
  .opponent-card .op-count { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 7px; font-size: 0.78rem; }
  .op-uno-badge { background: linear-gradient(135deg, #ff6ec7, #c44dff); color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 0.78rem; font-weight: 900; letter-spacing: 1px; }

  .play-area {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 12px; position: relative;
  }
  .color-indicator { font-size: 0.82rem; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 2px; }
  .pile-row { display: flex; gap: 20px; align-items: center; }
  .pile-label { font-size: 0.72rem; color: rgba(255,255,255,0.5); text-align: center; margin-top: 4px; }

  .discard-pile {
    width: 85px; height: 122px; border-radius: 11px; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 3px solid rgba(255,255,255,0.4); transition: all 0.3s;
  }
  .discard-pile.card-played { animation: cardPlayed 0.35s ease; }
  @keyframes cardPlayed {
    0% { transform: scale(0.7) rotate(-8deg); opacity: 0.5; }
    60% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .deck-btn {
    width: 85px; height: 122px; border-radius: 11px;
    background: linear-gradient(135deg, #2d0b5e, #1a0533);
    border: 3px solid rgba(255,110,199,0.4);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; box-shadow: 0 7px 22px rgba(0,0,0,0.4); transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }
  .deck-btn:hover { transform: scale(1.05) translateY(-4px); box-shadow: 0 10px 26px rgba(255,110,199,0.3); }
  .deck-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ドロースタック警告 */
  .draw-stack-alert {
    background: linear-gradient(135deg, #ff4444, #cc0000);
    color: #fff;
    border-radius: 14px;
    padding: 8px 18px;
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 1px;
    text-align: center;
    box-shadow: 0 4px 18px rgba(255,68,68,0.5);
    animation: stackPulse 0.5s ease-in-out infinite alternate;
    display: none;
  }
  .draw-stack-alert.show { display: block; }
  @keyframes stackPulse {
    from { transform: scale(1); box-shadow: 0 4px 18px rgba(255,68,68,0.5); }
    to { transform: scale(1.04); box-shadow: 0 4px 28px rgba(255,68,68,0.9); }
  }

  /* カードプレイ通知 */
  .play-notify {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(20,5,50,0.92);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 22px;
    padding: 18px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 800;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    backdrop-filter: blur(8px);
    min-width: 200px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  .play-notify.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .play-notify .pn-player { font-size: 0.88rem; color: #c9a0ff; font-weight: 700; }
  .play-notify .pn-card {
    font-size: 2.2rem;
    font-weight: 900;
    padding: 10px 20px;
    border-radius: 12px;
    border: 3px solid rgba(255,255,255,0.4);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    min-width: 70px;
  }
  .play-notify .pn-label { font-size: 0.82rem; color: rgba(255,255,255,0.6); }

  /* 吹き出し */
  .speech-bubble {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.95); color: #1a0533; border-radius: 18px;
    padding: 9px 16px; font-size: 0.88rem; font-weight: 700; pointer-events: none;
    opacity: 0; box-shadow: 0 4px 14px rgba(0,0,0,0.3); z-index: 100;
    transition: opacity 0.3s; max-width: 260px; text-align: center;
  }
  .speech-bubble.show { opacity: 1; }
  .speech-bubble::after { content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%); border: 7px solid transparent; border-top-color: rgba(255,255,255,0.95); border-bottom: 0; }

  .message-bar {
    background: rgba(0,0,0,0.4); padding: 7px 14px; font-size: 0.85rem; font-weight: 600;
    color: #c9a0ff; text-align: center; min-height: 34px;
    border-top: 1px solid rgba(255,255,255,0.08); border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .my-area {
    background: rgba(0,0,0,0.3); padding: 10px 14px 14px;
    border-top: 2px solid rgba(255,255,255,0.08);
  }
  .my-info { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
  .my-emoji { font-size: 1.6rem; }
  .my-name { font-size: 0.88rem; font-weight: 800; color: #ffb6e6; }

  /* 自分のUNOバッジ - より目立つ */
  .uno-badge {
    background: linear-gradient(135deg, #ff6ec7, #c44dff);
    color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 0.9rem; font-weight: 900;
    animation: unoPulse 0.5s ease-in-out infinite; letter-spacing: 2px;
    box-shadow: 0 0 16px rgba(255,110,199,0.7);
    text-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  @keyframes unoPulse { 0%,100% { transform: scale(1); box-shadow: 0 0 12px rgba(255,110,199,0.6); } 50% { transform: scale(1.15); box-shadow: 0 0 28px rgba(255,110,199,1); } }

  .hand {
    display: flex; gap: 6px; overflow-x: auto; padding: 4px 4px 8px;
    justify-content: flex-start; flex-wrap: nowrap;
  }
  .hand::-webkit-scrollbar { height: 3px; }
  .hand::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  .card {
    min-width: 60px; height: 88px; border-radius: 9px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 1rem; font-weight: 900; cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.45); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    position: relative; user-select: none; font-family: 'Nunito', sans-serif;
  }
  .card:hover { transform: translateY(-13px) scale(1.07); box-shadow: 0 10px 22px rgba(0,0,0,0.5); z-index: 10; }
  .card.playable { box-shadow: 0 0 0 3px #ffe06e, 0 5px 14px rgba(255,224,110,0.4); }
  .card.playable:hover { box-shadow: 0 0 0 3px #ffe06e, 0 10px 22px rgba(255,224,110,0.6); }
  /* +2スタック可能なカードの強調 */
  .card.stack-able { box-shadow: 0 0 0 3px #ff6ec7, 0 5px 14px rgba(255,110,199,0.5); }
  .card.stack-able:hover { box-shadow: 0 0 0 3px #ff6ec7, 0 10px 22px rgba(255,110,199,0.8); }
  .card .card-symbol { font-size: 1.3rem; }

  .color-picker-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    align-items: center; justify-content: center; z-index: 1000; display: none; backdrop-filter: blur(4px);
  }
  .color-picker-overlay.show { display: flex; }
  .color-picker-box { background: #1a0533; border: 2px solid rgba(255,255,255,0.2); border-radius: 22px; padding: 28px; text-align: center; width: 290px; }
  .color-picker-box h3 { font-size: 1.1rem; color: #ffb6e6; margin-bottom: 16px; }
  .color-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; }
  .color-pick-btn { padding: 16px; border-radius: 14px; border: none; font-size: 1.3rem; cursor: pointer; font-weight: 900; font-family: 'Nunito', sans-serif; transition: transform 0.2s; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.4); }
  .color-pick-btn:hover { transform: scale(1.08); }

  .win-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none;
    flex-direction: column; align-items: center; justify-content: center;
    z-index: 2000; text-align: center; gap: 18px; backdrop-filter: blur(6px);
  }
  .win-overlay.show { display: flex; }
  .win-char { font-size: 5.5rem; animation: bounce 0.55s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-18px); } }
  .win-title { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #ffe06e, #ff6ec7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .win-name { font-size: 1.3rem; color: #c9a0ff; font-weight: 700; }

  .confetti-piece { position: fixed; pointer-events: none; z-index: 3000; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  .c-red { background: linear-gradient(135deg, #ff4444, #cc0000); color: #fff; }
  .c-blue { background: linear-gradient(135deg, #4488ff, #0044cc); color: #fff; }
  .c-green { background: linear-gradient(135deg, #44cc44, #008800); color: #fff; }
  .c-yellow { background: linear-gradient(135deg, #ffee00, #cc9900); color: #1a0533; }
  .c-wild { background: linear-gradient(135deg, #ff4444 25%, #4488ff 25%, #4488ff 50%, #44cc44 50%, #44cc44 75%, #ffee00 75%); color: #fff; }

  /* UNOボタン - さらに目立つ */
  .uno-btn {
    position: fixed; bottom: 110px; right: 14px;
    background: linear-gradient(135deg, #ff3db8, #b800ff);
    color: #fff; border: 3px solid rgba(255,255,255,0.4); border-radius: 50px;
    padding: 14px 26px; font-size: 1.1rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 0 0 0 rgba(255,61,184,0.7);
    font-family: 'Nunito', sans-serif; z-index: 500; display: none;
    animation: unoShake 0.5s ease-in-out infinite, unoPing 1s ease-in-out infinite;
    letter-spacing: 3px; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  @keyframes unoShake {
    0%,100% { transform: rotate(0deg) scale(1.05); }
    25% { transform: rotate(-4deg) scale(1.08); }
    75% { transform: rotate(4deg) scale(1.08); }
  }
  @keyframes unoPing {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,61,184,0.7), 0 8px 25px rgba(255,61,184,0.5); }
    50% { box-shadow: 0 0 0 12px rgba(255,61,184,0), 0 8px 25px rgba(255,61,184,0.5); }
  }

  /* 全画面UNO通知 */
  .uno-flash {
    position: fixed; inset: 0; z-index: 1500; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
  }
  .uno-flash.show { opacity: 1; }
  .uno-flash-inner {
    font-size: 4rem; font-weight: 900; letter-spacing: 8px;
    background: linear-gradient(135deg, #ff6ec7, #ffe06e);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 0 30px rgba(255,110,199,0.8));
    animation: unoFlashBounce 0.4s ease;
  }
  @keyframes unoFlashBounce {
    0% { transform: scale(0.5); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .toast {
    position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.95); color: #1a0533; border-radius: 50px;
    padding: 9px 22px; font-size: 0.95rem; font-weight: 700; z-index: 5000;
    pointer-events: none; opacity: 0; transition: opacity 0.3s; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,0.3);
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<button class="btn-sound" id="soundToggle" onclick="toggleSound()">🔊 ON</button>
<div class="toast" id="toast"></div>

<!-- 全画面UNO通知 -->
<div class="uno-flash" id="unoFlash">
  <div class="uno-flash-inner" id="unoFlashText">UNO!!</div>
</div>

<!-- カードプレイ通知 -->
<div class="play-notify" id="playNotify">
  <div class="pn-player" id="pnPlayer"></div>
  <div class="pn-card" id="pnCard"></div>
  <div class="pn-label" id="pnLabel"></div>
</div>

<!-- TOP -->
<div class="screen active" id="topScreen">
  <div class="logo">UNO!</div>
  <div class="subtitle">✨ Online Multiplayer ✨</div>
  <div class="char-select-title">キャラクターを選んでね🎀</div>
  <div class="char-grid">
    <button class="char-btn selected" onclick="selectChar('🐱','ネコ',0)" id="char0"><span class="char-emoji">🐱</span><span class="char-name">ネコ</span></button>
    <button class="char-btn" onclick="selectChar('🐶','イヌ',1)" id="char1"><span class="char-emoji">🐶</span><span class="char-name">イヌ</span></button>
    <button class="char-btn" onclick="selectChar('🐻','クマ',2)" id="char2"><span class="char-emoji">🐻</span><span class="char-name">クマ</span></button>
    <button class="char-btn" onclick="selectChar('🐰','ウサギ',3)" id="char3"><span class="char-emoji">🐰</span><span class="char-name">ウサギ</span></button>
    <button class="char-btn" onclick="selectChar('🦊','キツネ',4)" id="char4"><span class="char-emoji">🦊</span><span class="char-name">キツネ</span></button>
    <button class="char-btn" onclick="selectChar('🐼','パンダ',5)" id="char5"><span class="char-emoji">🐼</span><span class="char-name">パンダ</span></button>
  </div>
  <div class="name-row">

// Audio
let audioCtx = null;
function getAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playTone(freq,dur,type='sine',vol=0.3) {
  if(!soundEnabled) return;
  try { const c=getAudio(),o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type=type; o.frequency.setValueAtTime(freq,c.currentTime); g.gain.setValueAtTime(vol,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+dur); o.start(c.currentTime); o.stop(c.currentTime+dur); } catch(e){}
}
function sfxPlay() { playTone(440,0.1,'square',0.2); setTimeout(()=>playTone(660,0.15,'square',0.2),80); }
function sfxDraw() { playTone(220,0.15,'sine',0.15); }
function sfxSkip() { playTone(330,0.1,'square',0.2); setTimeout(()=>playTone(220,0.1,'square',0.2),100); }
function sfxDraw2() { [180,180].forEach((f,i)=>setTimeout(()=>playTone(f,0.12,'sawtooth',0.2),i*130)); }
function sfxWild() { [330,440,550,660].forEach((f,i)=>setTimeout(()=>playTone(f,0.13,'sine',0.25),i*80)); }
function sfxWild4() { [330,440,550,660,440,330].forEach((f,i)=>setTimeout(()=>playTone(f,0.1,'sawtooth',0.2),i*80)); }
function sfxUno() { [660,880,1100].forEach((f,i)=>setTimeout(()=>playTone(f,0.25,'square',0.35),i*100)); }
function sfxWin() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'sine',0.4),i*150)); }
function sfxTurn() { playTone(880,0.12,'sine',0.25); }
function sfxStack() { [400,300,200].forEach((f,i)=>setTimeout(()=>playTone(f,0.1,'sawtooth',0.3),i*80)); }

// Deck
const COLORS=['red','blue','green','yellow'];
function createDeck() {
  const deck=[];
  for(const c of COLORS) {
    deck.push({color:c,value:'0',display:'0'});
    for(const n of ['1','2','3','4','5','6','7','8','9']) {
      deck.push({color:c,value:n,display:n});
      deck.push({color:c,value:n,display:n});
    }
    for(const [v,d] of [['skip','🚫'],['reverse','🔄'],['draw2','+2']]) {
      deck.push({color:c,value:v,display:d});
      deck.push({color:c,value:v,display:d});
    }
  }
  for(let i=0;i<4;i++) { deck.push({color:'wild',value:'wild',display:'★'}); deck.push({color:'wild',value:'wild4',display:'★+4'}); }
  return shuffle(deck);
}
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

window.goCreate = async function() {
  myName=getName(); myId=genId(); const code=genCode(); currentRoom=code; isHost=true;
  await set(ref(db,`rooms/${code}`),{ host:myId, phase:'waiting', players:{[myId]:{name:myName,emoji:myEmoji,ready:true}}, createdAt:Date.now() });
  document.getElementById('displayCode').textContent=code;
  showScreen('createScreen');
  subscribeRoom(code);
};

window.goJoin = function() { myName=getName(); myId=genId(); isHost=false; showScreen('joinScreen'); };

window.joinRoom = async function() {
  const code=document.getElementById('roomCodeInput').value.trim();
  if(code.length!==4){showToast('4桁のコードを入力してね！');return;}
  currentRoom=code;
  const snap=await get(ref(db,`rooms/${code}`));
  if(!snap.exists()){showToast('部屋が見つからないよ！');return;}
  const room=snap.val();
  if(room.phase!=='waiting'){showToast('もうゲームが始まってるよ！');return;}
  await update(ref(db,`rooms/${code}/players/${myId}`),{name:myName,emoji:myEmoji,ready:true});
  document.getElementById('joinStatusMsg').textContent='参加しました！ホストがスタートするのを待とう...';
  subscribeRoom(code);
};

function subscribeRoom(code) {
  if(unsubscribe) unsubscribe();
  roomRef=ref(db,`rooms/${code}`);
  unsubscribe=onValue(roomRef,(snap)=>{
    if(!snap.exists()){leaveGame();return;}
    const room=snap.val();
    if(room.phase==='waiting') renderWaiting(room);
    else if(room.phase==='playing'){
      if(!document.getElementById('gameScreen').classList.contains('active')) showScreen('gameScreen');
      gameState=room; renderGame(room);
    } else if(room.phase==='ended') handleWin(room.winner,room.players);
  });
}

function renderWaiting(room) {
  const players=room.players||{};
  const ids=Object.keys(players);
  ['waitingList','joinWaitingList'].forEach(lid=>{
    const list=document.getElementById(lid);
    if(!list) return;
    list.innerHTML=ids.map(id=>`<div class="player-item"><span class="p-emoji">${players[id].emoji||'🎮'}</span><span>${players[id].name}</span>${id===room.host?'<span class="host-badge">👑 ホスト</span>':''}</div>`).join('');
  });
  if(isHost) {
    const sb=document.getElementById('startBtn');
    if(ids.length>=2){sb.style.display='block';document.getElementById('waitingMsg').textContent=`${ids.length}人が揃いました！`;}
    else{sb.style.display='none';document.getElementById('waitingMsg').textContent='友達の参加を待っています...';}
  }
}

window.startGame = async function() {
  if(!isHost) return;
  const snap=await get(ref(db,`rooms/${currentRoom}/players`));
  const players=snap.val(); const ids=Object.keys(players);
  const deck=createDeck(); const hands={};
  ids.forEach(id=>{hands[id]=[];});
  for(let i=0;i<7;i++) ids.forEach(id=>hands[id].push(deck.pop()));
  let first; do{first=deck.pop();}while(first.value==='wild'||first.value==='wild4');
  await update(ref(db,`rooms/${currentRoom}`),{
    phase:'playing', deck, hands, discard:[first],
    currentColor:first.color, currentPlayer:ids[0], direction:1,
    drawStack:0, // ★ドロースタック
    lastPlay:null, // ★プレイ通知
    message:'ゲームスタート！', lastActionId:null
  });
};

function renderGame(room) {
  const players=room.players||{};
  const ids=Object.keys(players);
  const hands=room.hands||{};
  const myHand=hands[myId]||[];
  const discard=room.discard||[];
  const top=discard[discard.length-1];
  const isMyTurn=room.currentPlayer===myId;
  const drawStack=room.drawStack||0;

  // ターン表示
  const ti=document.getElementById('turnIndicator');
  if(isMyTurn) {
    ti.textContent='⭐ あなたのターン！'; ti.className='turn-indicator my-turn';
    if(!ti.dataset.notified){sfxTurn();ti.dataset.notified='1';}
  } else {
    const cp=players[room.currentPlayer];
    ti.textContent=cp?`${cp.emoji} ${cp.name}のターン`:''; ti.className='turn-indicator'; delete ti.dataset.notified;
  }

  // ★カードプレイ通知
  const lp=room.lastPlay;
  if(lp && lp.id !== lastPlayNotifyId) {
    lastPlayNotifyId=lp.id;
    // 自分のプレイ以外は通知
    if(lp.playerId !== myId) {
      const colorMap={red:'🔴',blue:'🔵',green:'🟢',yellow:'🟡',wild:'🌈'};
      const label = lp.actionLabel||'';
      showPlayNotify(lp.emoji, lp.name, lp.display, lp.color, label);
      // 場札アニメ
      setTimeout(()=>{
        const dp=document.getElementById('discardPile');
        dp.classList.remove('card-played');
        void dp.offsetWidth;
        dp.classList.add('card-played');
      }, 50);
    }
  }

  // ★UNO検知（手札が1枚になったとき）
  ids.forEach(id=>{
    const cnt=(hands[id]||[]).length;
    const prev=prevHandCounts[id];
    if(prev !== undefined && prev > 1 && cnt === 1) {
      const p=players[id];
      const isMe=id===myId;
      sfxUno();
      if(isMe){
        showUnoFlash('UNO!!');
      } else {
        showUnoFlash(`${p.emoji} ${p.name} UNO!!`);
      }
    }
    prevHandCounts[id]=cnt;
  });

  // 相手エリア（UNO状態を強調）
  document.getElementById('opponentsRow').innerHTML=ids.filter(id=>id!==myId).map(id=>{
    const p=players[id]; const cnt=(hands[id]||[]).length; const isActive=room.currentPlayer===id;
    const isUno=cnt===1;
    const cntHtml = isUno
      ? `<span class="op-uno-badge">🚨UNO</span>`
      : `<span class="op-count">📋${cnt}</span>`;
    return `<div class="opponent-card ${isActive?'active-player':''} ${isUno?'uno-danger':''}"><span class="op-emoji">${p.emoji||'🎮'}</span><span>${p.name}</span>${cntHtml}</div>`;
  }).join('');

  // 場札
  const dp=document.getElementById('discardPile');
  dp.textContent=top?top.display:'?'; dp.className='discard-pile c-'+(top?top.color:'wild');

  // 色表示
  const colorMap={red:'🔴 赤',blue:'🔵 青',green:'🟢 緑',yellow:'🟡 黄',wild:'🌈 ワイルド'};
  document.getElementById('colorIndicator').textContent='現在の色: '+(colorMap[room.currentColor]||'-');
  document.getElementById('messageBar').textContent=room.message||'';
  document.getElementById('myEmoji').textContent=myEmoji;
  document.getElementById('myNameLabel').textContent=myName;
  document.getElementById('unoBadge').style.display=myHand.length===1?'inline-block':'none';
  document.getElementById('unoBtn').style.display=(myHand.length===1&&isMyTurn)?'block':'none';
  document.getElementById('deckBtn').disabled=!isMyTurn;

  // ★ドロースタック警告
  const dsa=document.getElementById('drawStackAlert');
  if(drawStack>0 && isMyTurn){
    dsa.textContent=`⚠️ +2スタック中！${drawStack}枚 / +2で返せる！`;
    dsa.classList.add('show');
  } else {
    dsa.classList.remove('show');
  }

  // 手札レンダリング
  const handDiv=document.getElementById('myHand');
  handDiv.innerHTML='';
  myHand.forEach((card,idx)=>{
    const canPlay=isMyTurn&&canPlayCard(card,room);
    const isStackable=isMyTurn&&drawStack>0&&card.value==='draw2';
    const div=document.createElement('div');
    div.className=`card c-${card.color} ${isStackable?'stack-able':canPlay?'playable':''}`;
    div.innerHTML=`<span class="card-symbol">${card.display}</span>`;
    if(canPlay||isStackable) div.onclick=()=>playCard(idx);
    handDiv.appendChild(div);
  });
}

// ★drawStackを考慮したcanPlayCard
function canPlayCard(card,room) {
  const drawStack=room.drawStack||0;
  const top=(room.discard||[]).slice(-1)[0];
  // ドロースタック中は+2のみ返せる
  if(drawStack>0) return card.value==='draw2';
  if(!top) return true;
  if(card.color==='wild') return true;
  if(card.color===room.currentColor) return true;
  if(card.value===top.value) return true;
  return false;
}

window.playCard = async function(idx) {
  if(!gameState||gameState.currentPlayer!==myId) return;
  const hands={...gameState.hands};
  const myHand=[...hands[myId]];
  const card=myHand[idx];
  myHand.splice(idx,1); hands[myId]=myHand;
  const discard=[...(gameState.discard||[]),card];
  const players=gameState.players;
  const ids=Object.keys(players);

  let reaction=reactions[myEmoji]?.normal||'プレイ！';
  if(card.value==='skip') reaction=reactions[myEmoji]?.skip||'スキップ！';
  else if(card.value==='reverse') reaction=reactions[myEmoji]?.reverse||'逆転！';
  else if(card.value==='draw2') reaction=reactions[myEmoji]?.draw2||'+2！';
  else if(card.value==='wild') reaction=reactions[myEmoji]?.wild||'ワイルド！';
  else if(card.value==='wild4') reaction=reactions[myEmoji]?.wild4||'ワイルド+4！';
  showSpeech(reaction);

  if(card.value==='skip'||card.value==='reverse') sfxSkip();
  else if(card.value==='draw2') sfxDraw2();
  else if(card.value==='wild') sfxWild();
  else if(card.value==='wild4') sfxWild4();
  else sfxPlay();

  // 場札アニメ
  const dp=document.getElementById('discardPile');
  dp.classList.remove('card-played'); void dp.offsetWidth; dp.classList.add('card-played');

  if(myHand.length===0){
    await update(ref(db,`rooms/${currentRoom}`),{hands,discard,phase:'ended',winner:myId,message:`${myEmoji} ${myName} の勝ち！！🎉`});
    return;
  }

  await applyPlayCard(card,hands,discard,players,ids);
};

async function applyPlayCard(card,hands,discard,players,ids) {
  const currIdx=ids.indexOf(gameState.currentPlayer);
  let dir=gameState.direction;
  let next,deck=[...(gameState.deck||[])];
  let newColor=card.color==='wild'?gameState.currentColor:card.color;
  let drawStack=gameState.drawStack||0;
  let msg='';

  // ★プレイ通知データ
  let actionLabel='';

  if(card.value==='reverse'){
    dir*=-1;
    next=ids.length===2?myId:ids[(currIdx+dir+ids.length)%ids.length];
    msg=`🔄 ${myEmoji} ${myName} がリバース！`;
    actionLabel='リバース！';
  } else if(card.value==='skip'){
    const si=(currIdx+dir+ids.length)%ids.length;
    next=ids[(si+dir+ids.length)%ids.length];
    msg=`🚫 ${myEmoji} ${myName} がスキップ！`;
    actionLabel='スキップ！';
  } else if(card.value==='draw2'){
    // ★ドロースタック: 2を積み上げ、次のプレイヤーは+2で返すか引くか
    drawStack+=2;
    next=ids[(currIdx+dir+ids.length)%ids.length];
    msg=`⚠️ ${myEmoji} ${myName} が+2！ スタック: ${drawStack}枚`;
    actionLabel=`+2 スタック${drawStack}枚`;
    sfxStack();
  } else if(card.value==='wild4'){
    const target=ids[(currIdx+dir+ids.length)%ids.length];
    for(let i=0;i<4;i++){if(deck.length===0)deck=shuffle(discard.slice(0,-1));if(deck.length>0)hands[target].push(deck.pop());}
    next=ids[(currIdx+dir*2+ids.length)%ids.length];
    msg=`${players[target].emoji} ${players[target].name} が4枚ドロー！`;
    actionLabel='+4!!';
    const pw={hands,discard,next,dir,deck,drawStack:0,msg,actionLabel};
    pendingWild=pw;
    document.getElementById('colorPicker').classList.add('show');
    return;
  } else if(card.value==='wild'){
    next=ids[(currIdx+dir+ids.length)%ids.length];
    actionLabel='ワイルド！';
    const pw={hands,discard,next,dir,deck,drawStack:0,msg:`${myEmoji} ${myName} がワイルド！`,actionLabel};
    pendingWild=pw;
    document.getElementById('colorPicker').classList.add('show');
    return;
  } else {
    next=ids[(currIdx+dir+ids.length)%ids.length];
    msg=`${myEmoji} ${myName} が ${card.display} を出した！`;
    actionLabel=card.display;
    drawStack=0;
  }

  const aid=genId();
  const lastPlay={id:aid, playerId:myId, emoji:myEmoji, name:myName, display:card.display, color:card.color, actionLabel};
  await update(ref(db,`rooms/${currentRoom}`),{hands,discard,deck,currentColor:newColor,currentPlayer:next,direction:dir,drawStack,message:msg,lastPlay,lastActionId:aid});
}

window.pickColor = async function(color) {
  document.getElementById('colorPicker').classList.remove('show');
  if(!pendingWild) return;
  const {hands,discard,next,dir,deck,drawStack,msg,actionLabel}=pendingWild; pendingWild=null;
  const aid=genId();
  const lastPlay={id:aid, playerId:myId, emoji:myEmoji, name:myName, display:'★', color:'wild', actionLabel};
  await update(ref(db,`rooms/${currentRoom}`),{hands,discard,deck,currentColor:color,currentPlayer:next,direction:dir,drawStack:drawStack||0,message:msg+` 色→${color}`,lastPlay,lastActionId:aid});
};

// ★ドロー（スタック対応）
window.drawCard = async function() {
  if(!gameState||gameState.currentPlayer!==myId) return;
  let deck=[...(gameState.deck||[])];
  const hands={...gameState.hands};
  const myHand=[...hands[myId]];
  const discard=gameState.discard||[];
  const drawStack=gameState.drawStack||0;

  // スタックがあれば複数枚引く
  const drawCount=drawStack>0?drawStack:1;
  if(deck.length===0) deck=shuffle(discard.slice(0,-1));

  for(let i=0;i<drawCount;i++){
    if(deck.length===0) deck=shuffle(discard.slice(0,-1));
    if(deck.length>0) myHand.push(deck.pop());
  }
  hands[myId]=myHand;

  sfxDraw();
  if(drawStack>0){
    showSpeech(`${drawStack}枚ドロー！きつい...`);
    showToast(`😱 ${drawStack}枚ドロー！`);
  } else {
    showSpeech(reactions[myEmoji]?.draw||'ドロー...');
  }

  const players=gameState.players; const ids=Object.keys(players);
  const currIdx=ids.indexOf(myId); const dir=gameState.direction;
  const next=ids[(currIdx+dir+ids.length)%ids.length];
  const aid=genId();
  const msg=drawStack>0?`${myEmoji} ${myName} が${drawStack}枚ドロー！`:`${myEmoji} ${myName} がドロー`;
  await update(ref(db,`rooms/${currentRoom}`),{hands,deck,currentPlayer:next,drawStack:0,message:msg,lastActionId:aid});
};

window.callUno = function() { sfxUno(); showSpeech(reactions[myEmoji]?.uno||'UNO!!'); showToast('🔥 UNO！！'); };

function handleWin(winnerId,players) {
  const winner=players?.[winnerId]; if(!winner) return;
  const isMe=winnerId===myId;
  document.getElementById('winChar').textContent=winner.emoji||'🏆';
  document.getElementById('winName').textContent=isMe?`${winner.name} の勝ち！やったー！！`:`${winner.name} の勝ち！`;
  document.getElementById('winOverlay').classList.add('show');
  if(isMe){sfxWin();showSpeech(reactions[myEmoji]?.win||'勝ったー！！');launchConfetti();}
}

function launchConfetti() {
  const colors=['#ff6ec7','#4dbbff','#ffe06e','#43e97b','#c44dff','#ff4444'];
  for(let i=0;i<80;i++) {
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='confetti-piece';
      c.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>0.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;`;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),4000);
    },i*30);
  }
}

window.leaveGame = async function() {
  if(unsubscribe){unsubscribe();unsubscribe=null;}
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('colorPicker').classList.remove('show');
  document.getElementById('playNotify').classList.remove('show');
  document.getElementById('unoFlash').classList.remove('show');
  if(currentRoom){
    if(isHost) await remove(ref(db,`rooms/${currentRoom}`));
    else await remove(ref(db,`rooms/${currentRoom}/players/${myId}`));
    currentRoom=null;
  }
  isHost=false; gameState=null; pendingWild=null;
  prevHandCounts={}; lastPlayNotifyId=null;
  document.getElementById('roomCodeInput').value='';
  document.getElementById('joinStatusMsg').textContent='';
  document.getElementById('joinWaitingList').innerHTML='';
  document.getElementById('myHand').innerHTML='';
  showScreen('topScreen');
};
</script>
